<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Tap-Tap Burung Ngapung</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            box-sizing: border-box;
        }
        #gameContainer {
            position: relative;
            display: none; /* Disembunyikan dulu sampai input nama diisi */
        }
        canvas {
            background: #70c5ce;
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: block;
        }
        /* Gaya Layar Input Nama di Awal */
        #authScreen {
            background: rgba(0, 0, 0, 0.85);
            padding: 30px 40px;
            border-radius: 10px;
            border: 2px solid #f1c40f;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 320px;
            width: 100%;
        }
        #authScreen input {
            width: 80%;
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            margin-top: 15px;
            text-align: center;
            color: #222;
            font-weight: bold;
        }
        /* Layar Game Over yang Diperlebar untuk Memuat Papan Skor */
        #gameOverScreen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(15, 15, 15, 0.95);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #ff4757;
            width: 80%;
            max-height: 90%;
            overflow-y: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        button {
            background: #2ed573;
            border: none;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            margin-bottom: 15px;
            transition: 0.2s;
        }
        button:hover {
            background: #26af5f;
        }
        /* Tampilan Tabel Urutan Skor (Leaderboard) */
        #leaderboardSection {
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.08);
            padding: 12px;
            border-radius: 8px;
            text-align: left;
        }
        .leaderboard-title {
            margin: 0 0 10px 0;
            text-align: center;
            color: #f1c40f;
            font-size: 16px;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            padding-bottom: 5px;
        }
        .score-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 4px;
            font-size: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        /* Efek khusus papan urutan tertinggi */
        .rank-1 { color: #f1c40f; font-weight: bold; } 
        .highest-tag { color: #2ed573; font-size: 11px; margin-left: 5px; font-weight: normal; }
        .lowest-tag { color: #ff4757; font-size: 11px; margin-left: 5px; font-weight: normal; }
    </style>
</head>
<body>

<div id="authScreen">
    <h2 style="color: #f1c40f; margin: 0;">Burung Ngapung</h2>
    <p style="margin: 5px 0 15px 0; font-size: 14px; color: #ccc;">Masukkan nama kamu sebelum bermain</p>
    <input type="text" id="usernameInput" placeholder="Ketik Nama Maneh..." maxlength="15">
    <br>
    <button id="btnMulaiMain">Mulai Main Sok</button>
</div>

<div id="gameContainer">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    
    <div id="gameOverScreen">
        <h1 style="color: #ff4757; margin: 0 0 5px 0; font-size: 28px;">Maneh Eleh</h1>
        <p style="margin: 5px 0;">Pemain: <span id="currentPlayerName" style="color: #1e90ff; font-weight: bold;">-</span></p>
        <p style="margin: 5px 0 10px 0;">Skor Kamu: <span id="finalScore" style="font-weight: bold; font-size: 20px;">0</span></p>
        
        <button id="btnUlangGame">Ulang Deui Sok</button>
        
        <div id="leaderboardSection">
            <div class="leaderboard-title">🏆 URUTAN SKOR TERBAIK</div>
            <div id="scoreList">
                </div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const gameOverScreen = document.getElementById("gameOverScreen");
const finalScoreElement = document.getElementById("finalScore");
const authScreen = document.getElementById("authScreen");
const gameContainer = document.getElementById("gameContainer");
const scoreList = document.getElementById("scoreList");
const usernameInput = document.getElementById("usernameInput");
const currentPlayerName = document.getElementById("currentPlayerName");

// DATA PENGGUNA
let namaPemain = "";

// KONFIGURASI MUSIK LATAR (BGM)
const bgMusic = new Audio('bgm.mp3'); 
bgMusic.loop = true; 
bgMusic.volume = 0.4; 
let isMusicPlaying = false;

function jalankanMusik() {
    if (!isMusicPlaying) {
        bgMusic.play().catch(error => {
            console.log("Musik tertunda/gagal dimuat:", error);
        });
        isMusicPlaying = true;
    }
}

// KONFIGURASI EFEK SUARA GAME OVER
const gameOverSound = new Audio('gameover.mp3');
gameOverSound.volume = 0.6; 

// BARU: KONFIGURASI EFEK SUARA BURUNG DI-TAP (KEPAK SAYAP)
const flapSound = new Audio('kepak.mp3');
flapSound.volume = 0.5; // Mengatur volume suara kepakan (0.0 sampai 1.0)

// MEMUAT GAMBAR KARAKTER ANGRY BIRD RED
let isRedBirdLoaded = false;
const redBirdImg = new Image();
redBirdImg.src = 'red.png'; 
redBirdImg.onload = function() {
    isRedBirdLoaded = true;
};
redBirdImg.onerror = function() {
    console.log("File red.png tidak ditemukan. Menggunakan kotak cadangan.");
};

// KONDISI GAME
let gameRunning = false; 
let score = 0;

// PROPERTI BURUNG
const bird = {
    x: 50,
    y: 150,
    width: 36,   
    height: 36,  
    gravity: 0.6,
    lift: -10,
    velocity: 0,
    
    draw: function() {
        if (isRedBirdLoaded) {
            ctx.drawImage(redBirdImg, this.x, this.y, this.width, this.height);
        } else {
            ctx.fillStyle = "#ff4757";
            ctx.fillRect(this.x, this.y, this.width, this.height);
            ctx.fillStyle = "#fff";
            ctx.fillRect(this.x + 22, this.y + 6, 8, 8);
            ctx.fillStyle = "#e67e22";
            ctx.fillRect(this.x + 30, this.y + 14, 8, 8);
        }
    },
    
    update: function() {
        this.velocity += this.gravity;
        this.y += this.velocity;
        
        if (this.y + this.height >= canvas.height) {
            this.y = canvas.height - this.height;
            this.velocity = 0;
            gameOver();
        }
        if (this.y <= 0) {
            this.y = 0;
            this.velocity = 0;
        }
    },
    
    flap: function() {
        this.velocity = this.lift;
        jalankanMusik(); 
        
        // BARU: Memainkan efek suara kepak setiap kali fungsi flap dipanggil
        // currentTime = 0 berfungsi agar suara langsung terulang dari awal tanpa menunggu durasi suara selesai
        flapSound.currentTime = 0;
        flapSound.play().catch(error => console.log("Gagal memutar suara kepak:", error));
    }
};

// PROPERTI RINTANGAN (Pipa)
const pipes = [];
const pipeWidth = 60;
const pipeGap = 140; 
const pipeSpeed = 3;
let frameCount = 0;

function spawnPipe() {
    const minHeight = 50;
    const maxHeight = canvas.height - pipeGap - minHeight;
    const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
    const bottomHeight = canvas.height - topHeight - pipeGap;

    pipes.push({
        x: canvas.width,
        top: topHeight,
        bottom: bottomHeight,
        passed: false
    });
}

function drawPipes() {
    ctx.fillStyle = "#2ecc71"; 
    pipes.forEach(pipe => {
        ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);
        ctx.fillRect(pipe.x, canvas.height - pipe.bottom, pipeWidth, pipe.bottom);
    });
}

function updatePipes() {
    for (let i = pipes.length - 1; i >= 0; i--) {
        pipes[i].x -= pipeSpeed;

        if (!pipes[i].passed && pipes[i].x + pipeWidth < bird.x) {
            score++;
            pipes[i].passed = true;
        }

        if (
            bird.x < pipes[i].x + pipeWidth &&
            bird.x + bird.width > pipes[i].x &&
            (bird.y < pipes[i].top || bird.y + bird.height > canvas.height - pipes[i].bottom)
        ) {
            gameOver();
        }

        if (pipes[i].x + pipeWidth < 0) {
            pipes.splice(i, 1);
        }
    }
}

function drawScore() {
    ctx.fillStyle = "#fff";
    ctx.font = "bold 32px 'Segoe UI'";
    ctx.textAlign = "center";
    ctx.shadowColor = "rgba(0,0,0,0.3)";
    ctx.shadowBlur = 4;
    ctx.fillText(score, canvas.width / 2, 60);
    ctx.shadowBlur = 0; 
}

// LOGIKA DATABASE MINI (LOCALSTORAGE) & PENGURUTAN SKOR

function mulaiGamePertamaKali() {
    const inputVal = usernameInput.value.trim();
    if (inputVal === "") {
        alert("Isi dulu atuh namanya!");
        return;
    }
    namaPemain = inputVal;
    
    authScreen.style.display = "none";
    gameContainer.style.display = "block";
    
    gameRunning = true;
    loop();
}

function simpanSkorKeDatabase(nama, skorPoin) {
    let databaseSkor = JSON.parse(localStorage.getItem('databaseSkorBurung')) || [];
    
    databaseSkor.push({ nama: nama, skor: skorPoin });
    localStorage.setItem('databaseSkorBurung', JSON.stringify(databaseSkor));
    
    tampilkanLeaderboard();
}

function tampilkanLeaderboard() {
    let databaseSkor = JSON.parse(localStorage.getItem('databaseSkorBurung')) || [];
    
    if (databaseSkor.length === 0) {
        scoreList.innerHTML = "<p style='text-align:center;font-size:12px;color:#aaa;margin:5px 0;'>Belum ada riwayat skor.</p>";
        return;
    }

    // PENGURUTAN: Skor tertinggi di urutan awal, skor terendah di urutan akhir
    databaseSkor.sort((a, b) => b.skor - a.skor);

    const maxSkor = Math.max(...databaseSkor.map(d => d.skor));
    const minSkor = Math.min(...databaseSkor.map(d => d.skor));

    let htmlKonten = "";
    
    databaseSkor.forEach((data, index) => {
        let peringkat = index + 1;
        let gayaKelas = "";
        let labelRekor = "";

        if (peringkat === 1) {
            gayaKelas = "class='rank-1'";
            peringkat = "🥇"; 
        } else if (peringkat === 2) {
            peringkat = "🥈";
        } else if (peringkat === 3) {
            peringkat = "🥉";
        } else {
            peringkat = "#" + peringkat;
        }

        if (data.skor === maxSkor) {
            labelRekor = "<span class='highest-tag'>(Tertinggi)</span>";
        } else if (data.skor === minSkor && databaseSkor.length > 1) {
            labelRekor = "<span class='lowest-tag'>(Terendah)</span>";
        }

        htmlKonten += `
            <div class="score-row" ${gayaKelas}>
                <span>${peringkat} <b>${data.nama}</b>${labelRekor}</span>
                <span><b>${data.skor}</b> Poin</span>
            </div>
        `;
    });

    scoreList.innerHTML = htmlKonten;
}

// GAME OVER
function gameOver() {
    if (gameRunning) {
        gameOverSound.play().catch(error => console.log(error));
        simpanSkorKeDatabase(namaPemain, score);
    }

    gameRunning = false;
    currentPlayerName.innerText = namaPemain;
    finalScoreElement.innerText = score;
    gameOverScreen.style.display = "block";
    
    bgMusic.pause();
    isMusicPlaying = false;
}

// RESET GAME
function resetGame() {
    pipes.length = 0;
    bird.y = 150;
    bird.velocity = 0;
    score = 0;
    gameRunning = true;
    gameOverScreen.style.display = "none";
    
    gameOverSound.pause();
    gameOverSound.currentTime = 0;
    
    jalankanMusik();
    loop();
}

// KONTROL UTAMA (MENGGUNAKAN ADDEVENTLISTENER)
document.getElementById("btnMulaiMain").addEventListener("click", mulaiGamePertamaKali);
document.getElementById("btnUlangGame").addEventListener("click", resetGame);

window.addEventListener("keydown", function(e) {
    if (e.code === "Space" && gameRunning) {
        bird.flap();
    }
});

canvas.addEventListener("touchstart", function() {
    if (gameRunning) bird.flap();
});

canvas.addEventListener("mousedown", function() {
    if (gameRunning) bird.flap();
});

// GAME LOOP
function loop() {
    if (!gameRunning) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    bird.update();
    bird.draw();

    frameCount++;
    if (frameCount % 100 === 0) {
        spawnPipe();
    }

    updatePipes();
    drawPipes();

    drawScore();

    requestAnimationFrame(loop);
}
</script>

</body>
</html>
