<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Tap-Tap Burung Ngapung</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            background: #70c5ce;
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: block;
        }
        #gameOverScreen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 40px;
            border-radius: 10px;
            border: 2px solid #ff4757;
        }
        button {
            background: #2ed573;
            border: none;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }
        button:hover {
            background: #26af5f;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div id="gameOverScreen">
        <h1 style="color: #ff4757; margin: 0 0 10px 0;">Maneh Eleh</h1>
        <p>Skor Kamu: <span id="finalScore">0</span></p>
        <button onclick="resetGame()">Ulang Deui Sok</button>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const gameOverScreen = document.getElementById("gameOverScreen");
const finalScoreElement = document.getElementById("finalScore");

// KONFIGURASI MUSIK LATAR (BGM)
const bgMusic = new Audio('bgm.mp3'); 
bgMusic.loop = true; 
bgMusic.volume = 0.4; 
let isMusicPlaying = false;

function jalankanMusik() {
    if (!isMusicPlaying) {
        bgMusic.play().catch(error => {
            console.log("Musik tertunda/gagal dimuat:", error);
        });
        isMusicPlaying = true;
    }
}

// KONFIGURASI EFEK SUARA GAME OVER
const gameOverSound = new Audio('gameover.mp3');
gameOverSound.volume = 0.6; 

// MEMUAT GAMBAR KARAKTER ANGRY BIRD RED
let isRedBirdLoaded = false;
const redBirdImg = new Image();
redBirdImg.src = 'red.png'; 
redBirdImg.onload = function() {
    isRedBirdLoaded = true;
};
redBirdImg.onerror = function() {
    console.log("File red.png tidak ditemukan. Menggunakan kotak cadangan.");
};

// KONDISI GAME
let gameRunning = true;
let score = 0;

// PROPERTI BURUNG (Karakter Utama)
const bird = {
    x: 50,
    y: 150,
    width: 36,   
    height: 36,  
    gravity: 0.6,
    lift: -10,
    velocity: 0,
    
    draw: function() {
        if (isRedBirdLoaded) {
            ctx.drawImage(redBirdImg, this.x, this.y, this.width, this.height);
        } else {
            ctx.fillStyle = "#ff4757";
            ctx.fillRect(this.x, this.y, this.width, this.height);
            ctx.fillStyle = "#fff";
            ctx.fillRect(this.x + 22, this.y + 6, 8, 8);
            ctx.fillStyle = "#e67e22";
            ctx.fillRect(this.x + 30, this.y + 14, 8, 8);
        }
    },
    
    update: function() {
        this.velocity += this.gravity;
        this.y += this.velocity;
        
        if (this.y + this.height >= canvas.height) {
            this.y = canvas.height - this.height;
            this.velocity = 0;
            gameOver();
        }
        if (this.y <= 0) {
            this.y = 0;
            this.velocity = 0;
        }
    },
    
    flap: function() {
        this.velocity = this.lift;
        jalankanMusik(); 
    }
};

// PROPERTI RINTANGAN (Pipa)
const pipes = [];
const pipeWidth = 60;
const pipeGap = 140; 
const pipeSpeed = 3;
let frameCount = 0;

function spawnPipe() {
    const minHeight = 50;
    const maxHeight = canvas.height - pipeGap - minHeight;
    const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
    const bottomHeight = canvas.height - topHeight - pipeGap;

    pipes.push({
        x: canvas.width,
        top: topHeight,
        bottom: bottomHeight,
        passed: false
    });
}

function drawPipes() {
    ctx.fillStyle = "#2ecc71"; 
    pipes.forEach(pipe => {
        ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);
        ctx.fillRect(pipe.x, canvas.height - pipe.bottom, pipeWidth, pipe.bottom);
    });
}

function updatePipes() {
    for (let i = pipes.length - 1; i >= 0; i--) {
        pipes[i].x -= pipeSpeed;

        if (!pipes[i].passed && pipes[i].x + pipeWidth < bird.x) {
            score++;
            pipes[i].passed = true;
        }

        if (
            bird.x < pipes[i].x + pipeWidth &&
            bird.x + bird.width > pipes[i].x &&
            (bird.y < pipes[i].top || bird.y + bird.height > canvas.height - pipes[i].bottom)
        ) {
            gameOver();
        }

        if (pipes[i].x + pipeWidth < 0) {
            pipes.splice(i, 1);
        }
    }
}

function drawScore() {
    ctx.fillStyle = "#fff";
    ctx.font = "bold 32px 'Segoe UI'";
    ctx.textAlign = "center";
    ctx.shadowColor = "rgba(0,0,0,0.3)";
    ctx.shadowBlur = 4;
    ctx.fillText(score, canvas.width / 2, 60);
    ctx.shadowBlur = 0; 
}

// GAME OVER
function gameOver() {
    if (gameRunning) {
        gameOverSound.play().catch(error => console.log("Gagal memutar audio game over:", error));
    }

    gameRunning = false;
    finalScoreElement.innerText = score;
    gameOverScreen.style.display = "block";
    
    bgMusic.pause();
    isMusicPlaying = false;
}

// RESET GAME
function resetGame() {
    pipes.length = 0;
    bird.y = 150;
    bird.velocity = 0;
    score = 0;
    gameRunning = true;
    gameOverScreen.style.display = "none";
    
    // FIX: Hentikan paksa suara game over agar tidak bocor ke game baru
    gameOverSound.pause();
    gameOverSound.currentTime = 0;
    
    jalankanMusik();
    loop();
}

// INPUT KONTROL
window.addEventListener("keydown", function(e) {
    if (e.code === "Space" && gameRunning) {
        bird.flap();
    }
});

canvas.addEventListener("touchstart", function() {
    if (gameRunning) bird.flap();
});

canvas.addEventListener("mousedown", function() {
    if (gameRunning) bird.flap();
});

// GAME LOOP
function loop() {
    if (!gameRunning) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    bird.update();
    bird.draw();

    frameCount++;
    if (frameCount % 100 === 0) {
        spawnPipe();
    }

    updatePipes();
    drawPipes();

    drawScore();

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
